name: Pull Retroid binder

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pull binder JSON
        run: node scripts/pull-retroid.mjs
        env:
          YGOPROG_TOKEN: ${{ secrets.YGOPROG_TOKEN }}

      - name: Commit changes
        run: |
          if git diff --quiet -- dist/data/generated/retroid99.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/data/generated/retroid99.json
          git commit -m "Update Retroid binder"
          git push