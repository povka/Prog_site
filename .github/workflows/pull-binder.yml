name: Build binder JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build-binders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Build binder JSON
        env:
          YGOPROG_USER_ASAPASKA: ${{ secrets.YGOPROG_USER_ASAPASKA }}
          YGOPROG_PASS_ASAPASKA: ${{ secrets.YGOPROG_PASS_ASAPASKA }}
          YGOPROG_USER_RETROID99: ${{ secrets.YGOPROG_USER_RETROID99 }}
          YGOPROG_PASS_RETROID99: ${{ secrets.YGOPROG_PASS_RETROID99 }}
          YGOPROG_USER_MHKAIXER: ${{ secrets.YGOPROG_USER_MHKAIXER }}
          YGOPROG_PASS_MHKAIXER: ${{ secrets.YGOPROG_PASS_MHKAIXER }}
          YGOPROG_USER_SHIRUBA: ${{ secrets.YGOPROG_USER_SHIRUBA }}
          YGOPROG_PASS_SHIRUBA: ${{ secrets.YGOPROG_PASS_SHIRUBA }}
        run: python scripts/build_binder_json.py

      - name: Upload login debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit generated files
        run: |
          if git diff --quiet -- dist/data/generated; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/data/generated
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git commit -m "Update binder JSON ${TIMESTAMP}"
          git push

      - name: Notify Discord as Thicc Magician Girl
        if: steps.generated_changes.outputs.changed == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python scripts/notify_binder_changes.py HEAD~1 HEAD